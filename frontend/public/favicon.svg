<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Center Core (Sun / Vedic Gochara Core) -->
  <circle cx="32" cy="32" r="8" fill="url(#core-grad)" stroke="#E67E22" stroke-width="1.5" />
  
  <!-- Orbit 1 (Inner) -->
  <circle cx="32" cy="32" r="14" stroke="#C89B3C" stroke-width="1" stroke-dasharray="2 2" opacity="0.6" />
  <!-- Planet on Orbit 1 -->
  <circle cx="41.9" cy="22.1" r="2.5" fill="#E67E22" />
  
  <!-- Orbit 2 (Middle) -->
  <circle cx="32" cy="32" r="21" stroke="#C89B3C" stroke-width="1.2" opacity="0.7" />
  <!-- Planet on Orbit 2 -->
  <circle cx="17.15" cy="46.85" r="3.5" fill="#8E44AD" />
  
  <!-- Orbit 3 (Outer) -->
  <circle cx="32" cy="32" r="27" stroke="#C89B3C" stroke-width="1" stroke-dasharray="4 2" opacity="0.5" />
  <!-- Planet on Orbit 3 -->
  <circle cx="32" cy="5" r="3" fill="#3498DB" />
  
  <defs>
    <radialGradient id="core-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD6A5" />
      <stop offset="100%" stop-color="#E67E22" />
    </radialGradient>
  </defs>
</svg>